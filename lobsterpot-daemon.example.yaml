# Host-local LobsterPot control plane configuration

port: 7555
stateDir: ~/.lobsterpot

llm:
  provider: lmstudio
  model: qwen2.5-coder-7b-instruct
  baseUrl: http://127.0.0.1:1234/v1
  enabled: false
  timeoutMs: 15000
  # For OpenRouter:
  # provider: openrouter
  # model: meta-llama/llama-3.3-70b-instruct:free
  # apiKeyEnv: OPENROUTER_API_KEY

monitoring:
  checkIntervalMs: 45000
  captureLines: 120
  idleThresholdMs: 300000
  stuckThresholdMs: 720000
  restartBackoffMs: 30000
  contextCompactThresholdPct: 80
  autoNudge: true
  autoCompact: true
  autoRestart: true

webhook:
  url: https://example.invalid/lobsterpot-events
  headers:
    x-lobsterpot-source: daemon
  enabledEvents:
    - pot.complete
    - pot.error
    - pot.stuck
    - pot.milestone

# Optional agent overrides.
agents:
  claude-code:
    command: claude
    type: interactive-tui
    costTier: high
  codex:
    command: codex
    type: interactive-tui
    costTier: medium
  aider-local:
    command: aider --model ollama/qwen2.5-coder:14b
    type: interactive-tui
    costTier: free
